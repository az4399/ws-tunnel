name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag name, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    env:
      APP_NAME: ws-tunnel
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build server
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin server

      - name: Build client
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin client

      - name: Package release bundle
        shell: bash
        run: |
          set -euo pipefail
          PKG_DIR="${APP_NAME}-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "dist/${PKG_DIR}/examples"
          cp "target/${{ matrix.target }}/release/server" "dist/${PKG_DIR}/server"
          cp "target/${{ matrix.target }}/release/client" "dist/${PKG_DIR}/client"
          cp "examples/server.toml" "dist/${PKG_DIR}/examples/server.toml"
          cp "examples/client.toml" "dist/${PKG_DIR}/examples/client.toml"
          cp "README.md" "dist/${PKG_DIR}/README.md"
          tar -C dist -czf "dist/${PKG_DIR}.tar.gz" "${PKG_DIR}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}
          path: dist/*.tar.gz

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: dist/*.tar.gz
          generate_release_notes: true
