name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag name, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
            platform: linux/amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
            platform: linux/arm64

    env:
      APP_NAME: ws-tunnel
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      UPX_VERSION: 5.0.2
      REGISTRY: ghcr.io
      IMAGE_CLIENT: ghcr.io/${{ github.repository_owner }}/ws-tunnel-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install UPX
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/upx.tar.xz "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz"
          tar -C /tmp -xf /tmp/upx.tar.xz
          echo "/tmp/upx-${UPX_VERSION}-amd64_linux" >> "$GITHUB_PATH"

      - name: Build server
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin server

      - name: Build client
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin client

      - name: Compress binaries with UPX
        shell: bash
        run: |
          set -euo pipefail
          upx --best --lzma --ultra-brute "target/${{ matrix.target }}/release/server"
          upx --best --lzma --ultra-brute "target/${{ matrix.target }}/release/client"

      - name: Package release bundle
        shell: bash
        run: |
          set -euo pipefail
          PKG_DIR="${APP_NAME}-${VERSION}-linux-${{ matrix.arch }}"
          RELEASE_DIR="dist/release/${PKG_DIR}"
          mkdir -p "${RELEASE_DIR}/examples"
          cp "target/${{ matrix.target }}/release/server" "${RELEASE_DIR}/server"
          cp "target/${{ matrix.target }}/release/client" "${RELEASE_DIR}/client"
          cp "examples/server.toml" "${RELEASE_DIR}/examples/server.toml"
          cp "examples/client.toml" "${RELEASE_DIR}/examples/client.toml"
          cp "README.md" "${RELEASE_DIR}/README.md"
          tar -C "dist/release" -czf "dist/release/${PKG_DIR}.tar.gz" "${PKG_DIR}"

      - name: Prepare Docker contexts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/docker/client
          cp "target/${{ matrix.target }}/release/client" "dist/docker/client/app"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-linux-${{ matrix.arch }}
          path: dist/release/*.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push client image
        uses: docker/build-push-action@v6
        with:
          context: dist/docker/client
          file: ${{ github.workspace }}/Dockerfile.client
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE_CLIENT }}:${{ env.VERSION }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ env.VERSION }}

  merge-images:
    runs-on: ubuntu-latest
    needs: build
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      IMAGE_CLIENT: ghcr.io/${{ github.repository_owner }}/ws-tunnel-client
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create client multi-arch tags
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE_CLIENT}:${VERSION}" \
            --tag "${IMAGE_CLIENT}:latest" \
            "${IMAGE_CLIENT}:${VERSION}-amd64" \
            "${IMAGE_CLIENT}:${VERSION}-arm64"

  publish-release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ws-tunnel-${{ env.VERSION }}-linux-*
          merge-multiple: true
          path: dist/release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: dist/release/*.tar.gz
          generate_release_notes: true
